<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wordle</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: #121213;
    --color-header-bg: #1a1a1b;
    --color-border: #3a3a3c;
    --color-text: #ffffff;
    --color-subtext: #818384;
    --color-correct: #538d4e;
    --color-present: #b59f3b;
    --color-absent: #3a3a3c;
    --color-key-bg: #818384;
    --color-key-text: #ffffff;
    --color-tile-bg: #121213;
    --color-tile-border-empty: #3a3a3c;
    --color-tile-border-filled: #565758;
    --tile-size: clamp(52px, 13vw, 62px);
    --tile-gap: 5px;
  }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--color-border);
    padding: 0 12px;
    height: 50px;
    position: relative;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1.65rem;
    font-weight: 700;
    letter-spacing: .12rem;
    text-transform: uppercase;
  }
  #btn-new {
    position: absolute;
    right: 12px;
    background: var(--color-correct);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 6px 11px;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .05rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: filter .15s;
  }
  #btn-new:hover { filter: brightness(1.15); }
  #btn-new:active { filter: brightness(.9); }

  /* ── TOASTS ── */
  #toast-container {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 999;
    pointer-events: none;
  }
  .toast {
    background: var(--color-text);
    color: var(--color-bg);
    padding: 12px 18px;
    border-radius: 6px;
    font-size: .875rem;
    font-weight: 700;
    animation: toastIn .1s ease forwards;
    white-space: nowrap;
  }
  .toast.out { animation: toastOut .3s ease forwards; }
  @keyframes toastIn  { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  @keyframes toastOut { from { opacity:1; transform:translateY(0); }    to { opacity:0; transform:translateY(-6px); } }

  /* ── LOADING ── */
  #loading {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--color-subtext);
  }
  .spinner {
    width: 34px; height: 34px;
    border: 4px solid var(--color-border);
    border-top-color: var(--color-subtext);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── GAME AREA ── */
  #game {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 8px;
    width: 100%;
    max-width: 500px;
    gap: 6px;
  }

  /* ── BOARD ── */
  #board {
    display: grid;
    grid-template-rows: repeat(6, var(--tile-size));
    grid-template-columns: repeat(5, var(--tile-size));
    gap: var(--tile-gap);
  }

  .tile {
    width: var(--tile-size);
    height: var(--tile-size);
    border: 2px solid var(--color-tile-border-empty);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.6rem, 5.5vw, 2rem);
    font-weight: 700;
    text-transform: uppercase;
    color: var(--color-text);
    background: var(--color-tile-bg);
    transition: border-color .05s;
    perspective: 250px;
  }
  .tile[data-letter] { border-color: var(--color-tile-border-filled); }

  /* Reveal states (set after flip midpoint) */
  .tile[data-state="correct"] { background: var(--color-correct); border-color: var(--color-correct); }
  .tile[data-state="present"] { background: var(--color-present); border-color: var(--color-present); }
  .tile[data-state="absent"]  { background: var(--color-absent);  border-color: var(--color-absent);  }

  /* Animations */
  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    10%,50%,90% { transform: translateX(-4px); }
    30%,70%     { transform: translateX(4px); }
  }
  @keyframes flipIn {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
  }
  @keyframes flipOut {
    0%   { transform: rotateX(-90deg); }
    100% { transform: rotateX(0deg); }
  }
  @keyframes bounce {
    0%,20%   { transform: translateY(0); }
    40%      { transform: translateY(-20px); }
    50%      { transform: translateY(5px); }
    60%      { transform: translateY(-12px); }
    80%      { transform: translateY(3px); }
    100%     { transform: translateY(0); }
  }
  .anim-pop    { animation: pop   .1s ease; }
  .anim-shake  { animation: shake .5s ease; }
  .anim-flipIn { animation: flipIn  .25s ease forwards; }
  .anim-flipOut{ animation: flipOut .25s ease forwards; }
  .anim-bounce { animation: bounce .8s ease; }

  /* ── KEYBOARD ── */
  #keyboard {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 0 8px;
  }
  .kbd-row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .key {
    background: var(--color-key-bg);
    color: var(--color-key-text);
    border: none;
    border-radius: 4px;
    height: clamp(52px, 12vw, 58px);
    min-width: clamp(30px, 8.5vw, 43px);
    font-size: clamp(.7rem, 2.4vw, .875rem);
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    transition: background .15s, color .15s;
  }
  .key.wide { min-width: clamp(48px, 13.5vw, 65px); font-size: clamp(.6rem, 2vw, .8rem); }
  .key[data-state="correct"] { background: var(--color-correct); }
  .key[data-state="present"] { background: var(--color-present); }
  .key[data-state="absent"]  { background: var(--color-absent);  }
  .key:active { filter: brightness(.85); }

  /* ── ERROR STATE ── */
  #error-msg {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px; color:var(--color-subtext); text-align:center; padding:20px;
    font-size:.95rem;
  }
  #error-msg span { font-size:2rem; }
</style>
</head>
<body>

<header>
  <h1>Wordle</h1>
  <button id="btn-new" onclick="location.reload()">New Word</button>
</header>

<div id="toast-container"></div>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading word list…</p>
</div>

<div id="game" style="display:none">
  <div id="board"></div>
  <div id="keyboard"></div>
</div>

<div id="error-msg" style="display:none">
  <span>⚠️</span>
  <p>Could not load the word list.<br>Check your connection and refresh.</p>
</div>

<script>
(() => {
  /* ── CONFIG ── */
  const WORD_URL = 'https://raw.githubusercontent.com/tabatkins/wordle-list/main/words';
  const ROWS = 6, COLS = 5;
  const WIN_MSGS = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
  const KEY_LAYOUT = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  const STATE_RANK = { correct:3, present:2, absent:1 };

  /* ── STATE ── */
  let words = [], target = '', guess = '', curRow = 0, over = false, busy = false, gen = 0;
  let tiles = []; // tiles[row][col]
  let keyEls = {}; // letter → <button>

  /* ── DOM ── */
  const $loading = document.getElementById('loading');
  const $game    = document.getElementById('game');
  const $error   = document.getElementById('error-msg');
  const $board   = document.getElementById('board');
  const $kbd     = document.getElementById('keyboard');
  const $btnNew  = document.getElementById('btn-new');
  const $toasts  = document.getElementById('toast-container');

  /* ── UTILITIES ── */
  function flash(el, anim) {
    el.classList.remove(anim);
    void el.offsetWidth; // reflow
    el.classList.add(anim);
    el.addEventListener('animationend', () => el.classList.remove(anim), { once: true });
  }

  function showToast(msg, ms = 1200) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    $toasts.appendChild(t);
    const remove = () => { t.classList.add('out'); setTimeout(() => t.remove(), 300); };
    setTimeout(remove, ms);
  }

  /* ── WORD LOADING ── */
  async function loadWords() {
    try {
      const res = await fetch(WORD_URL);
      if (!res.ok) throw new Error('fetch failed');
      const text = await res.text();
      words = text.trim().split(/\s+/).filter(w => w.length === 5).map(w => w.toLowerCase());
      if (!words.length) throw new Error('empty');
      $loading.style.display = 'none';
      $game.style.display = 'flex';
      buildBoard();
      buildKbd();
      startGame();
    } catch {
      $loading.style.display = 'none';
      $error.style.display = 'flex';
    }
  }

  /* ── BOARD BUILDER ── */
  function buildBoard() {
    $board.innerHTML = '';
    tiles = [];
    for (let r = 0; r < ROWS; r++) {
      tiles[r] = [];
      for (let c = 0; c < COLS; c++) {
        const el = document.createElement('div');
        el.className = 'tile';
        $board.appendChild(el);
        tiles[r][c] = el;
      }
    }
  }

  function clearBoard() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        const t = tiles[r][c];
        t.textContent = '';
        t.removeAttribute('data-letter');
        t.removeAttribute('data-state');
        t.className = 'tile';
      }
  }

  /* ── KEYBOARD BUILDER ── */
  function buildKbd() {
    $kbd.innerHTML = '';
    keyEls = {};
    KEY_LAYOUT.forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'kbd-row';
      row.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key' + (k === 'ENTER' || k === '⌫' ? ' wide' : '');
        btn.textContent = k;
        btn.dataset.key = k;
        btn.addEventListener('click', () => handleKey(k));
        rowEl.appendChild(btn);
        if (k !== 'ENTER' && k !== '⌫') keyEls[k] = btn;
      });
      $kbd.appendChild(rowEl);
    });
  }

  function resetKbd() {
    Object.values(keyEls).forEach(el => el.removeAttribute('data-state'));
  }

  function updateKey(letter, state) {
    const el = keyEls[letter.toUpperCase()];
    if (!el) return;
    const cur = el.dataset.state;
    if (!cur || (STATE_RANK[state] || 0) > (STATE_RANK[cur] || 0)) {
      el.dataset.state = state;
    }
  }

  /* ── SYNC CURRENT ROW ── */
  function syncRow() {
    for (let c = 0; c < COLS; c++) {
      const t = tiles[curRow][c];
      const letter = guess[c] || '';
      t.textContent = letter.toUpperCase();
      if (letter) t.dataset.letter = letter;
      else t.removeAttribute('data-letter');
    }
  }

  /* ── EVALUATE GUESS ── */
  function evalGuess(g, t) {
    const result = Array(COLS).fill('absent');
    const tArr   = t.split('');
    const gArr   = g.split('');

    // Pass 1: correct
    for (let i = 0; i < COLS; i++) {
      if (gArr[i] === tArr[i]) {
        result[i] = 'correct';
        tArr[i] = null;
        gArr[i] = null;
      }
    }
    // Pass 2: present
    for (let i = 0; i < COLS; i++) {
      if (gArr[i] === null) continue;
      const j = tArr.indexOf(gArr[i]);
      if (j !== -1) {
        result[i] = 'present';
        tArr[j] = null;
      }
    }
    return result;
  }

  /* ── ANIMATIONS ── */
  function shakeRow() {
    const rowEls = tiles[curRow];
    rowEls.forEach(t => flash(t, 'anim-shake'));
  }

  function revealRow(result, cb) {
    const myGen = gen;
    const DELAY = 300; // ms between tiles
    const HALF  = 250; // ms per half-flip

    result.forEach((state, i) => {
      const t = tiles[curRow][i];
      setTimeout(() => {
        if (gen !== myGen) return;
        t.classList.add('anim-flipIn');
        t.addEventListener('animationend', () => {
          if (gen !== myGen) return;
          t.removeAttribute('data-letter'); // keep text visible via content
          t.dataset.state = state;
          updateKey(guess[i], state);
          t.classList.remove('anim-flipIn');
          t.classList.add('anim-flipOut');
          t.addEventListener('animationend', () => {
            t.classList.remove('anim-flipOut');
            if (i === COLS - 1 && gen === myGen) cb();
          }, { once: true });
        }, { once: true });
      }, i * DELAY);
    });
  }

  function bounceRow() {
    tiles[curRow].forEach((t, i) => {
      setTimeout(() => flash(t, 'anim-bounce'), i * 80);
    });
  }

  /* ── MAIN HANDLER ── */
  function handleKey(k) {
    if (busy || over) return;

    if (k === '⌫' || k === 'BACKSPACE') {
      if (guess.length > 0) {
        guess = guess.slice(0, -1);
        syncRow();
      }
      return;
    }

    if (k === 'ENTER') {
      if (guess.length < COLS) { showToast('Not enough letters'); shakeRow(); return; }
      if (!words.includes(guess)) { showToast('Not in word list'); shakeRow(); return; }

      busy = true;
      const result = evalGuess(guess, target);
      revealRow(result, () => {
        const won = result.every(s => s === 'correct');
        if (won) {
          bounceRow();
          setTimeout(() => showToast(WIN_MSGS[curRow] ?? 'Genius!', 2500), 400);
          over = true; busy = false;
        } else {
          curRow++;
          if (curRow >= ROWS) {
            setTimeout(() => showToast(target.toUpperCase(), 4000), 300);
            over = true; busy = false;
          } else {
            guess = '';
            busy = false;
          }
        }
      });
      return;
    }

    if (/^[A-Za-z]$/.test(k) && guess.length < COLS) {
      guess += k.toLowerCase();
      syncRow();
      flash(tiles[curRow][guess.length - 1], 'anim-pop');
    }
  }

  /* ── START / NEW GAME ── */
  function startGame() {
    gen++; // cancel any in-flight animations
    target = words[Math.floor(Math.random() * words.length)];
    guess  = '';
    curRow = 0;
    over   = false;
    busy   = false;
    clearBoard();
    resetKbd();
  }

  /* ── PHYSICAL KEYBOARD ── */
  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key === 'Backspace')                    handleKey('BACKSPACE');
    else if (e.key === 'Enter')                   handleKey('ENTER');
    else if (/^[A-Za-z]$/.test(e.key))            handleKey(e.key.toUpperCase());
  });

  /* ── NEW WORD BUTTON ── */
  $btnNew.addEventListener('click', () => {
    if (!words.length) return;
    startGame();
  });

  /* ── INIT ── */
  loadWords();
})();
</script>
</body>
</html>
